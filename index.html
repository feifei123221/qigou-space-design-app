<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#171815"><meta name="description" content="深度访谈后生成空间设计方案"><link rel="manifest" href="./manifest.webmanifest"><link rel="icon" href="./icon.svg"><link rel="stylesheet" href="./styles.css?v=8"><title>栖构 · AI空间设计总监</title></head>
<body><header class="topbar"><a class="brand" href="#"><span class="brand-mark">栖</span><span><strong>栖构</strong><small>AI 空间设计总监</small></span></a><div class="top-actions"><span class="status-dot" id="apiStatus">检查生图服务</span><button class="ghost" id="installButton" hidden>安装到设备</button><button class="ghost" id="newProjectButton">新建设计</button></div></header>
<main class="workspace">
<aside class="media-panel panel" data-panel="media"><div class="panel-heading"><div><span>01</span><h2>项目素材</h2></div><p>现场决定边界，参考图表达偏好。</p></div>
<label class="upload-zone primary-upload"><input type="file" id="sceneInput" accept="image/*" capture="environment"><span class="upload-icon">＋</span><strong>上传空间现场图</strong><small>手机可直接拍摄，建议包含完整墙面与门窗</small></label><div class="scene-preview" id="scenePreview"></div>
<div class="reference-header"><h3>物件与风格参考</h3><span id="referenceCount">0 / 3</span></div><label class="upload-zone compact-upload"><input type="file" id="referenceInput" accept="image/*" multiple><span>＋ 添加家具、灯具、材质或氛围图</span></label><div class="reference-grid" id="referenceGrid"></div>
<div class="conversation-entry-hint"><strong>素材准备好后，只在访谈区对话</strong><p>文字输入、语音描述和后续修改都使用同一个对话栏。</p><button class="secondary" id="openConversationButton">进入设计对话</button></div></aside>
<section class="conversation-panel panel" data-panel="conversation"><div class="panel-heading sticky-heading"><div><span>02</span><h2>设计对话</h2></div><p>从初次需求到方案修改，都在这里完成。</p></div><div class="progress"><i id="progressBar"></i></div><div class="messages" id="messages"><article class="message designer"><div class="avatar">栖</div><div><strong>设计总监</strong><p>先上传现场图，再在下方直接打字或点击麦克风说出需求。模糊没关系，我会逐步帮你想清楚。</p></div></article></div></section>
<aside class="strategy-panel panel" data-panel="strategy"><div class="panel-heading"><div><span>03</span><h2>设计决策</h2></div><p>每一个视觉结果，都对应明确理由。</p></div><div class="empty-strategy" id="emptyStrategy"><div class="line-art">⌂</div><h3>等待空间诊断</h3><p>完成关键访谈后，这里会形成可确认的设计需求书，而不是直接输出一张“漂亮但不属于你”的图。</p></div><div id="strategyContent" hidden></div></aside></main>
<div class="composer global-composer" id="composer"><div class="composer-context" id="composerContext" aria-live="polite"></div><div class="quick-options" id="quickOptions"></div><div class="voice-status" id="voiceStatus" aria-live="polite"></div><div class="composer-row"><button class="voice-button" id="voiceInputButton" type="button" aria-label="开始语音输入" title="语音输入">🎙</button><textarea id="answerInput" rows="1" placeholder="直接描述你的空间需求，也可以点击麦克风说话……"></textarea><button class="send" id="sendButton" aria-label="发送消息">↑</button></div><div class="composer-tools"><span>首次需求、追问回答、生成后修改都使用这个对话栏</span></div></div>
<nav class="mobile-nav"><button data-mobile-tab="media" class="active">素材</button><button data-mobile-tab="conversation">访谈</button><button data-mobile-tab="strategy">方案</button></nav>
<template id="strategyTemplate"><div class="strategy-content"><div class="strategy-status"><span>需求理解完成</span><b>待确认</b></div><section><small>空间定位</small><h3 data-field="positioning"></h3></section><section><small>三个核心目标</small><ol data-field="goals"></ol></section><div class="decision-grid"><section><small>气质方向</small><p data-field="style"></p></section><section><small>灯光策略</small><p data-field="lighting"></p></section><section><small>色彩材质</small><p data-field="materials"></p></section><section><small>格局与陈设</small><p data-field="layout"></p></section></div><section class="constraints"><small>必须保留 / 避免</small><p data-field="constraints"></p></section><div class="evidence-grid"><section><small>现场已知</small><p data-field="known"></p></section><section><small>专业推断</small><p data-field="inferred"></p></section><section><small>施工前待核</small><p data-field="unknown"></p></section></div><div class="strategy-actions"><button class="secondary" id="reviseButton">继续讨论</button><button class="primary" id="confirmButton">确认方案并生成效果图</button></div><div class="generation" id="generation" hidden><div class="generation-head"><h3>视觉方案</h3><span id="generationState">生成中</span></div><div class="result-grid" id="resultGrid"></div></div></div></template>
<script src="./app.js?v=8" defer></script></body></html>
